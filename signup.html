<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signup</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Your CSS -->
  <link rel="stylesheet" href="./css/signup.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="signup-card p-4">

      <a class="navbar-brand text-light logotext ms-2" href="#"><i class="fa-solid fa-square-check customIcon"></i>
        Focus<span class="logo">Flow</span></a>


    <h2 class="mt-3 text-center">Create Account</h2>
    <p class="text-secondary" text-center">Start your productivity journey</p>


    <div class="input-group mb-3">
      <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
      <input type="text" class="form-control" placeholder="Full Name">
    </div>


    <div class="input-group mb-3">
      <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
      <input type="email" class="form-control" placeholder="Email">
    </div>

    <!-- Password -->
    <div class="input-group mb-3">
      <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
      <input type="password" class="form-control" placeholder="Password">
    </div>

    <!-- Confirm Password -->
    <div class="input-group mb-3">
      <span class="input-group-text"><i class="fa-regular fa-circle-check"></i></i></span>
      <input type="password" class="form-control" placeholder="Confirm Password">
    </div>

   
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="terms">
      <label class="form-check-label text-secondary small" for="terms">
        I agree to the Terms & Conditions
      </label>
    </div>

    <!-- Signup Button -->
    <button class="btn login-btn w-100">Sign Up</button>

    <!-- Login Link -->
    <p class="text-center mt-3 text-secondary">
      Already have an account?
      <a href="./login.html" class="signup">Login</a>
    </p>

  </div>
</div>

</body>
</html>
