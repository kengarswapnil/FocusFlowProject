<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/notes.css">

</head>

<body>


  <div class="d-flex flex-column sidebar flex-shrink-0 p-3 text-white bg-dark" style="width: 280px;">
    <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">

      <span class="fs-4 logotext headFont"><i class="fa-solid fa-square-check customIcon"></i> Focus <span
          class="logo">Flow</span></span>
    </a>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
      <li class="nav-item">
        <a href="./dashboard.html" class="nav-link  text-secondary headFont" aria-current="page">
          <i class="fa-regular fa-house me-3"></i>
          Dashboard
        </a>
      </li>
      <li>
        <a href="./tasks.html" class="nav-link  text-secondary headFont">

          <i class="fa-solid fa-list-check me-3"></i>
          Tasks
        </a>
      </li>
      <li>
        <a href="#" class="nav-link text-secondary headFont">

          <i class="fa-solid fa-stopwatch me-3"></i>
          Timer
        </a>
      </li>
      <li>
        <a href="./notes.html" class="nav-link active text-secondary headFont">

          <i class="fa-regular fa-clipboard me-3"></i>
          Notes
        </a>
      </li>
      <li>
        <a href="./weather.html" class="nav-link text-secondary headFont">

          <i class="fa-solid fa-cloud me-3"></i>
          Weather
        </a>
      </li>
      <li>
        <a href="./analytics.html" class="nav-link text-secondary headFont">
          <i class="fa-solid fa-chart-column me-3"></i>
          Anylatics
        </a>
      </li>
    </ul>
    <hr>
    <div class="dropdown ">
      <a href="#" class="d-flex align-items-center text-secondary ms-2 text-decoration-none mb-2 " id="dropdownUser1">
        <strong class="headFont"><i class="fa-solid fa-gear me-3"></i>Setting</strong>
      </a>

      <a href="#" class="d-flex align-items-center text-secondary text-decoration-none ms-2 mt-2" id="dropdownUser1">
        <strong class="headFont"><i class="fa-solid fa-arrow-right-from-bracket me-3"></i>Logout</strong>
      </a>
    </div>
  </div>


  <!-- main content  -->
  <div class="main-content">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary ">
      <div class="container-fluid ">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-between" id="navbarSupportedContent">
          <form class="d-flex ms-3" role="search">
            <input class="form-control CustomInput text-white" type="search" placeholder="Search" aria-label="Search" />
          </form>

          <div class="profile me-5">
            <a class="me-3"><i class="fa-solid fa-bell icon mt-2"></i></a>
            <div class="dropdown">
              <button class="btn btn-control dropdown-toggle" type="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                <i class="fa-solid fa-circle-user"></i>
                John Doe
              </button>
              <ul class="dropdown-menu">
                <li><a class="dropdown-item text-primary" href="#">View Profile</a></li>
                <li><a class="dropdown-item text-danger" href="#">Logout</a></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </nav>


    <div class="container mt-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-white">My Notes</h3>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
          <i class="bi bi-plus-lg"></i> Add Notes
        </button>
      </div>
    </div>


    <div class="container mt-4">
      <div class="row g-4" id="card">

        <!-- Card 1 -->
        
      </div>
    </div>



    <!-- Modal -->
    <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">Add Tasks</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body bg-secondary">
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="title" placeholder="name@example.com" />
              <label for="task">Task</label>
            </div>
            <div class="form-floating mb-3">
              <input type="text" class="form-control" id="content" placeholder="Add content" />
              <label for="content">Content</label>
            </div>

          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
              Close
            </button>
            <button type="button" class="btn btn-primary" id="addnotes" data-bs-dismiss="modal">Add Notes</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"></script>

    <script src="js/notes.js"></script>
</body>

</html>
