<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FocusFlow Signup</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="./css/auth.css">
</head>

<body>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="auth-card">


      <a class="navbar-brand text-light ms-2" href="#">
        <i class="fa-solid fa-square-check customIcon"></i>
        Focus<span class="logo">Flow</span>
      </a>


      <h2 class="mt-3 text-center">Create Account</h2>
      <p class="text-light-custom text-center">Start your productivity journey</p>


      <div class="input-group mb-3">
        <span class="input-group-text">
          <i class="fa-regular fa-user"></i>
        </span>
        <input type="text" id="fullname" class="form-control" placeholder="Full Name">
      </div>

      <div class="input-group mb-3">
        <span class="input-group-text">
          <i class="fa-regular fa-envelope"></i>
        </span>
        <input type="email" id="email" class="form-control" placeholder="Email">
      </div>


      <div class="input-group mb-3">
        <span class="input-group-text">
          <i class="fa-solid fa-lock"></i>
        </span>
        <input type="password" id="password" class="form-control" placeholder="Password">
      </div>


      <div class="input-group mb-3">
        <span class="input-group-text">
          <i class="fa-regular fa-circle-check"></i>
        </span>
        <input type="password" id="cpassword" class="form-control" placeholder="Confirm Password">
      </div>


      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="terms">
        <label class="form-check-label text-light-custom small" for="terms">
          I agree to the Terms & Conditions
        </label>
      </div>

      <button class="btn auth-btn w-100" onclick="Signup()">Sign Up</button>


      <p class="text-center mt-3 text-light-custom">
        Already have an account?
        <a href="./login.html" class="link">Login</a>
      </p>

    </div>
  </div>

  <script>



    async function Signup() {

      let fullname = document.getElementById("fullname").value.trim();
      let email = document.getElementById('email').value
      let password = document.getElementById('password').value;
      let cpassword = document.getElementById('cpassword').value


      if (!fullname || !email || !password || !cpassword) {
        alert("All fields Are requird")
        return;
      }

      if (password != cpassword) {
        alert("Password do not match");
        return
      }

      try {


        const res = await fetch("http://localhost:3000/api/auth/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ fullname, email, password, repassword: cpassword })

        }
        );
        const data = await res.json();

        if (data.message === "Signup Success") {
          alert("Signup Successful ✅");
          window.location.href = "./login.html";
        } else {
          alert(data.message);
        }

      } catch (err) {
        console.log(err);
        alert("Server Error ❌");
      }

    }
  </script>

</body>

</html>
