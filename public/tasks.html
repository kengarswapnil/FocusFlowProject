 <!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focus Flow Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons (IMPORTANT FIX) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="./css/task.css">
</head>

<body>

  <!-- ================= SIDEBAR ================= -->
  <div class="sidebar d-flex flex-column flex-shrink-0 p-3 text-white">

    <a href="#" class="d-flex align-items-center mb-3 text-white text-decoration-none">
      <span class="fs-4 logotext headFont">
        <i class="fa-solid fa-square-check customIcon"></i>
        Focus <span class="logo">Flow</span>
      </span>
    </a>

    <hr>

    <ul class="nav nav-pills flex-column mb-auto">
      <li>
        <a href="./dashboard.html" class="nav-link text-secondary headFont">
          <i class="fa-solid fa-house me-2"></i> Dashboard
        </a>
      </li>

      <li><a href="" class="nav-link active text-secondary headFont"><i class="fa-solid fa-list-check me-2"></i> Tasks</a></li>
      <li><a href="./timer.html" class="nav-link text-secondary headFont"><i class="fa-solid fa-stopwatch me-2"></i> Timer</a></li>
      <li><a href="./notes.html" class="nav-link text-secondary headFont"><i class="fa-regular fa-clipboard me-2"></i> Notes</a></li>
      <li><a href="./weather.html" class="nav-link text-secondary headFont"><i class="fa-solid fa-cloud me-2"></i> Weather</a></li>
      <li><a href="./analytics.html" class="nav-link text-secondary headFont"><i class="fa-solid fa-chart-column me-2"></i> Analytics</a></li>
    </ul>

    <hr>

    <a href="#" class="text-secondary headFont mb-2">
      <i class="fa-solid fa-gear me-2"></i> Settings
    </a>

    <a href="#" class="text-secondary headFont">
      <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Logout
    </a>

  </div>

  <!-- ================= MAIN CONTENT ================= -->
  <div class="main-content">

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg px-3">

      <form class="d-flex">
        <input class="form-control CustomInput" type="search" placeholder="Search tasks...">
      </form>

      <div class="ms-auto d-flex align-items-center gap-3">

        <i class="fa-solid fa-bell icon text-white"></i>

        <div class="dropdown">
          <button class="btn btn-control dropdown-toggle text-white" data-bs-toggle="dropdown">
            <i class="fa-solid fa-circle-user me-1"></i> John Doe
          </button>

          <ul class="dropdown-menu">
            <li><a class="dropdown-item text-decoration-none" href="#"> View Profile</a></li>
            <li><a class="dropdown-item" href="#">Logout</a></li>
          </ul>
        </div>

      </div>
    </nav>

    <!-- ================= DASHBOARD ================= -->
    <div class="dashboard">

      <h1 class="page-title text-white">My Tasks</h1>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <button class="filter-btn active">All</button>
        <button class="filter-btn text-white">Pending</button>
        <button class="filter-btn text-white">Completed</button>

        <input class="search-box" type="text" placeholder="Search tasks...">

        <button class="add-btn">
          <i class="bi bi-plus-lg"></i> Add Task
        </button>
      </div>

      <!-- GRID -->
      <div class="main-grid">

        <!-- TASK LIST -->
        <div class="task-list-card">
[25-04-2026 10:40] Swapnil: <div class="task-item">
            <div class="chk done"></div>
            <span class="task-name done">Complete Project Documentation</span>
            <span class="task-badge badge-today">Today</span>
            <div class="task-actions">
              <button class="icon-btn edit"><i class="bi bi-pencil"></i></button>
              <button class="icon-btn del"><i class="bi bi-trash"></i></button>
            </div>
          </div>

          <div class="task-item">
            <div class="chk done"></div>
            <span class="task-name done">Complete Assignments</span>
            <span class="task-badge badge-tomorrow">Tomorrow</span>
            <div class="task-actions">
              <button class="icon-btn edit"><i class="bi bi-pencil"></i></button>
              <button class="icon-btn del"><i class="bi bi-trash"></i></button>
            </div>
          </div>

          <div class="task-item">
            <div class="chk pending"></div>
            <span class="task-name text-white">Call Mom</span>
            <span class="task-badge badge-date">Jan 15</span>
            <div class="task-actions">
              <button class="icon-btn edit"><i class="bi bi-pencil"></i></button>
              <button class="icon-btn del"><i class="bi bi-trash"></i></button>
            </div>
          </div>

        </div>

        <!-- SUMMARY -->
        <div class="summary-card">

          <div class="summary-title text-white">Task Summary</div>

          <div class="donut-wrap">
            <div class="donut-ring"></div>

            <div class="donut-center text-center">
              <div class="donut-count text-white">8</div>
              <div class="donut-label text-primary"><strong>Total Tasks</strong></div>
              
            </div>
          </div>

          <div class="legend">

            <div class="legend-item">
              <div class="legend-dot" style="background:#22c55e"></div>
              Completed (5)
            </div>

            <div class="legend-item">
              <div class="legend-dot" style="background:#f97316"></div>
              Pending (3)
            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
