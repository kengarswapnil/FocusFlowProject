<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Focus Flow Dashboard</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

  <!-- Bootstrap Icons (IMPORTANT FIX) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <!-- Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Saira:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- CSS -->
  <link rel="stylesheet" href="./css/task.css" />
</head>

<body>
  <!-- ================= SIDEBAR ================= -->
  <div class="sidebar d-flex flex-column flex-shrink-0 p-3 text-white">
    <a href="#" class="d-flex align-items-center mb-3 text-white text-decoration-none">
      <span class="fs-4 logotext headFont">
        <i class="fa-solid fa-square-check customIcon"></i>
        Focus <span class="logo">Flow</span>
      </span>
    </a>

    <hr />

    <ul class="nav nav-pills flex-column mb-auto">
      <li>
        <a href="./dashboard.html" class="nav-link text-secondary headFont">
          <i class="fa-solid fa-house me-2"></i> Dashboard
        </a>
      </li>

      <li>
        <a href="" class="nav-link active text-secondary headFont"><i class="fa-solid fa-list-check me-2"></i> Tasks</a>
      </li>
      <li>
        <a href="./timer.html" class="nav-link text-secondary headFont"><i class="fa-solid fa-stopwatch me-2"></i>
          Timer</a>
      </li>
      <li>
        <a href="./notes.html" class="nav-link text-secondary headFont"><i class="fa-regular fa-clipboard me-2"></i>
          Notes</a>
      </li>
      <li>
        <a href="./weather.html" class="nav-link text-secondary headFont"><i class="fa-solid fa-cloud me-2"></i>
          Weather</a>
      </li>
      <li>
        <a href="./analytics.html" class="nav-link text-secondary headFont"><i
            class="fa-solid fa-chart-column me-2"></i> Analytics</a>
      </li>
    </ul>

    <hr />

    <a href="#" class="text-secondary headFont mb-2">
      <i class="fa-solid fa-gear me-2"></i> Settings
    </a>

    <a href="#" class="text-secondary headFont">
      <i class="fa-solid fa-arrow-right-from-bracket me-2"></i> Logout
    </a>
  </div>

  <!-- ================= MAIN CONTENT ================= -->
  <div class="main-content">
    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg px-3">
      <form class="d-flex">
        <input class="form-control CustomInput" type="search" placeholder="Search tasks..." />
      </form>

      <div class="ms-auto d-flex align-items-center gap-3">
        <i class="fa-solid fa-bell icon text-white"></i>

        <div class="dropdown">
          <button class="btn btn-control dropdown-toggle text-white" data-bs-toggle="dropdown">
            <i class="fa-solid fa-circle-user me-1"></i> John Doe
          </button>

          <ul class="dropdown-menu">
            <li>
              <a class="dropdown-item text-decoration-none" href="#">
                View Profile</a>
            </li>
            <li><a class="dropdown-item" href="#">Logout</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ================= DASHBOARD ================= -->
    <div class="dashboard">
      <h1 class="page-title text-white">My Tasks</h1>

      <!-- TOOLBAR -->
      <div class="toolbar">
        <button class="filter-btn active" onclick="filterTask('all',event)">All</button>
        <button class="filter-btn text-white" onclick="filterTask('pending',event)">Pending</button>
        <button class="filter-btn text-white" onclick="filterTask('completed',event)">Completed</button>

        <input class="search-box" type="text" placeholder="Search tasks..." />

        <button class="add-btn" data-bs-toggle="modal" data-bs-target="#exampleModal">
          <i class="bi bi-plus-lg"></i> Add Task
        </button>
      </div>

      <!-- GRID -->
      <div class="main-grid mb-3">
        <!-- TASK LIST -->
        <div class="task-list-card" id="taskList">


        </div>


        <!-- SUMMARY -->
        <div class="summary-card">
          <div class="summary-title text-white">Task Summary</div>

          <div class="donut-wrap">
            <div class="donut-ring"></div>

            <div class="donut-center text-center">
              <div class="donut-count text-white" id="counttask"></div>
              <div class="donut-label text-primary">
                <strong>Total Tasks</strong>
              </div>
            </div>
          </div>

          <div class="legend">
            <div class="legend-item">
              <div class="legend-dot" style="background: #22c55e"></div>
              Completed (<span id="Completed">0</span>)
            </div>

            <div class="legend-item">
              <div class="legend-dot" style="background: #f97316"></div>
              Pending (<span id="pending">0</span>)
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="exampleModalLabel">Add Tasks</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body bg-secondary">
          <div class="form-floating mb-3">
            <input type="email" class="form-control" id="task" placeholder="name@example.com" />
            <label for="task">Task</label>
          </div>
          <div class="form-floating mb-3">
            <input type="date" class="form-control" id="date" placeholder="Password" />
            <label for="date">Date</label>
          </div>
          <div class="form-floating ">
            <input type="text" class="form-control" id="Status" placeholder="Status" />
            <label for="date">Status</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
            Close
          </button>
          <button type="button" class="btn btn-primary" id="addtask">Add Tasks</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/task.js"></script>
</body>

</html>
