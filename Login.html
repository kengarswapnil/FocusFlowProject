<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FocusFlow Login</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  
  <link rel="stylesheet" href="./css/login.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="login-card p-4">

    <a class="navbar-brand text-light logotext ms-2" href="#"><i class="fa-solid fa-square-check customIcon"></i>
        Focus<span class="logo">Flow</span></a>

    <h2 class="mt-3">Welcome Back!</h2>
    <p class="text-secondary">Sign in to continue your productivity journey</p>


    <div class="input-group mb-3">
      <span class="input-group-text"><i class="fa-regular fa-user"></i></span>
      <input type="text" class="form-control" placeholder="Email or Username">
    </div>

    <div class="input-group mb-3">
      <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
      <input type="password" class="form-control" placeholder="Password">
    </div>

  
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <input type="checkbox" class="form-check-input" id="remember">
        <label for="remember" class="text-white small"> Remember Me</label>
      </div>
      <a href="#" class="forgot">Forgot Password?</a>
    </div>

  
    <button class="btn login-btn w-100">Login</button>

   <p class="text-center mt-3 text-secondary">
  Don't have an account? 
  <a href="./signup.html" class="signup">Sign Up</a>
</p>

  </div>
</div>

</body>
</html>
