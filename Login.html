<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FocusFlow Login</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Common Auth CSS -->
  <link rel="stylesheet" href="./css/auth.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="auth-card">

    <!-- Logo -->
    <a class="navbar-brand text-light ms-2" href="#">
      <i class="fa-solid fa-square-check customIcon"></i>
      Focus<span class="logo">Flow</span>
    </a>

    <!-- Heading -->
    <h2 class="mt-3">Welcome Back!</h2>
    <p class="text-light-custom">Sign in to continue your productivity journey</p>

    <!-- Email / Username -->
    <div class="input-group mb-3">
      <span class="input-group-text">
        <i class="fa-regular fa-user"></i>
      </span>
      <input type="text" class="form-control" placeholder="Email or Username">
    </div>

    <!-- Password -->
    <div class="input-group mb-3">
      <span class="input-group-text">
        <i class="fa-solid fa-lock"></i>
      </span>
      <input type="password" class="form-control" placeholder="Password">
    </div>

    <!-- Remember + Forgot -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <input type="checkbox" class="form-check-input" id="remember">
        <label for="remember" class="small"> Remember Me</label>
      </div>
      <a href="./forgotpassword.html" class="link">Forgot Password?</a>
    </div>

    <!-- Button -->
    <button class="btn auth-btn w-100">Login</button>

    <!-- Signup Link -->
    <p class="text-center mt-3 text-light-custom">
      Don't have an account?
      <a href="./signup.html" class="link">Sign Up</a>
    </p>

  </div>
</div>

</body>
</html>
