<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FocusFlow Forgot Password</title>


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

 
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/auth.css">
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="auth-card">

    <a class="navbar-brand text-light ms-2" href="#">
      <i class="fa-solid fa-square-check customIcon"></i>
      Focus<span class="logo">Flow</span>
    </a>


    <h2 class="mt-3 text-center">Forgot Password?</h2>
    <p class="text-light-custom text-center">
      Enter your email to receive a reset link
    </p>


    <div class="input-group mb-3">
      <span class="input-group-text">
        <i class="fa-regular fa-envelope"></i>
      </span>
      <input type="email" class="form-control" placeholder="Enter your email">
    </div>


    <button class="btn auth-btn w-100">Send Reset Link</button>

    <p class="text-center mt-3 text-light-custom">
      Remember your password?
      <a href="./login.html" class="link">Login</a>
    </p>

  </div>
</div>

</body>
</html>
